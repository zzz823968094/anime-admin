services:
  anime-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anime-admin
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://lsj.animeparadise.vip}
    env_file:
      - .env.production
    networks:
      - anime-network

networks:
  anime-network:
    driver: bridge
